# Nginx template for Aliyun ECS.
# Replace your-domain.com and paths before enabling.

limit_req_zone $binary_remote_addr zone=yan_ce_api_rate:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=yan_ce_login_rate:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=yan_ce_ai_rate:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=yan_ce_conn:10m;

upstream yan_ce_ai_backend {
  server 127.0.0.1:4300;
  keepalive 32;
}

server {
  listen 80;
  server_name your-domain.com www.your-domain.com;

  # Enable this after SSL is configured.
  # return 301 https://$host$request_uri;

  root /var/www/yan-ce-ai/frontend;
  index index.html;

  client_max_body_size 5m;
  access_log /var/log/nginx/yan-ce-ai.access.log;
  error_log /var/log/nginx/yan-ce-ai.error.log warn;

  limit_conn yan_ce_conn 30;

  location ~* /(wp-admin|wp-login|phpmyadmin|\.env|\.git|vendor|composer\.json|server-status) {
    return 403;
  }

  location /api/auth/login {
    limit_req zone=yan_ce_login_rate burst=5 nodelay;
    proxy_pass http://yan_ce_ai_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/admin/login {
    limit_req zone=yan_ce_login_rate burst=5 nodelay;
    proxy_pass http://yan_ce_ai_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/analysis {
    limit_req zone=yan_ce_ai_rate burst=3 nodelay;
    proxy_pass http://yan_ce_ai_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=yan_ce_api_rate burst=30 nodelay;
    proxy_pass http://yan_ce_ai_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|json)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
