# Nginx 基础限流模板
# 说明：这不是完整 DDoS 防护，只是服务器入口层的基础抗刷配置。

limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_rate:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ai_rate:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

server {
  listen 80;
  server_name example.com;

  client_max_body_size 5m;
  access_log /var/log/nginx/yan-ce-ai.access.log;
  error_log /var/log/nginx/yan-ce-ai.error.log warn;

  limit_conn addr_conn 30;

  location ~* /(wp-admin|wp-login|phpmyadmin|\.env|\.git|vendor|composer\.json) {
    return 403;
  }

  location /api/auth/login {
    limit_req zone=login_rate burst=5 nodelay;
    proxy_pass http://127.0.0.1:4300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/admin/login {
    limit_req zone=login_rate burst=5 nodelay;
    proxy_pass http://127.0.0.1:4300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/analysis {
    limit_req zone=ai_rate burst=3 nodelay;
    proxy_pass http://127.0.0.1:4300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api_rate burst=30 nodelay;
    proxy_pass http://127.0.0.1:4300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /var/www/yan-ce-ai;
    try_files $uri $uri/ /index.html;
    expires 1h;
  }

  location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
    root /var/www/yan-ce-ai;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
